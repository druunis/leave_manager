kind = "web"
previewPath = "/"
title = "Leave Tracker"
version = "1.0.0"
id = "artifacts/leave-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22574

[services.development]
run = "pnpm --filter @workspace/leave-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leave-tracker", "run", "build" ]
publicDir = "artifacts/leave-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22574"
BASE_PATH = "/"
